<!DOCTYPE html>

    <script>
        // 使用立即执行函数表达式（IIFE）封装全部逻辑，避免全局变量污染
        (function() {
            // ── helpers ──
            // 通用的 Excel/CSV 二进制数据解析函数
function parseWorkbookToQuestions(arrayBuffer, fileName) {
    const data = new Uint8Array(arrayBuffer);
    const workbook = XLSX.read(data, { type: 'array' });
    let all = [];
    workbook.SheetNames.forEach(sn => {
        const sheet = workbook.Sheets[sn];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
        for (let i = 1; i < json.length; i++) {
            let row = json[i];
            if (!row || row.length < 2) continue;
            let questionCell = row[0], answerCell = row[1], typeCell = row[2];
            if (questionCell !== undefined && questionCell !== null && questionCell !== '' &&
                answerCell !== undefined && answerCell !== null && answerCell !== '') {
                let qType = (typeCell !== undefined && typeCell !== null && String(typeCell).trim() !== '') ? String(typeCell).trim() : (sn || '其他');
                all.push({ 題目: String(questionCell), 答案: String(answerCell), 類型: qType });
            }
        }
    });
    return all;
}

// 统一处理获取到的题目数据：更新 uploadedData、UI 状态等
function handleLoadedQuestions(questions, sourceDescription) {
    uploadedData = questions;
    uploadHint.innerText = sourceDescription;
    // 自动将题目来源切换到“上传”模式
    sourceRadios.forEach(r => { if (r.value === 'upload') r.checked = true; });
    excelUpload.disabled = false;      // 用户仍可手动上传覆盖
    usingRandom = false;
    updateTypeCheckboxesFromData();
    updateDefaultStatus();
}

// 尝试通过 fetch 自动加载同目录下的 question.xlsx 或 question.csv
async function autoLoadQuestionFile() {
    const filesToTry = ['question.xlsx', 'question.csv'];
    for (let fileName of filesToTry) {
        try {
            const response = await fetch(fileName);
            if (!response.ok) continue;   // 文件不存在则尝试下一个
            const arrayBuffer = await response.arrayBuffer();
            const questions = parseWorkbookToQuestions(arrayBuffer, fileName);
            if (questions.length > 0) {
                handleLoadedQuestions(questions, `✅ 已自動載入 ${fileName}（${questions.length} 題）`);
                return true;   // 加载成功
            }
        } catch (e) {

            // 生成[min, max]范围内的随机整数

            // 判断答案是否为多部分格式（如“X 輛，最後一輛有 Y 個空位”或“X 小時 Y 分鐘”）

            // ── NEW: smart answer comparison (number w/o unit accepted) ──
            // 判断用户答案是否正确，支持省略单位的纯数字匹配
            function isAnswerCorrect(userAns, correct) {
                let u = userAns.replace(/\s/g, '');
                let c = correct.replace(/\s/g, '');
                if (u === c) return true;
                // 含“...”的余数答案，不能用纯数字匹配
                if (c.includes('...')) return false;
                // 时间格式（含“:”）不能纯数字匹配
                if (c.includes(':')) return false;
                // 如果正确答案以数字开头后跟非数字，用户只输入了纯数字，则比较数值
                let m = c.match(/^(\d+(?:\.\d+)?)\D.*$/);
                if (m) {
                    let numStr = m[1];
                    if (/^[\d.]+$/.test(u)) {
                        let userNum = parseFloat(u);
                        let correctNum = parseFloat(numStr);
                        if (!isNaN(userNum) && !isNaN(correctNum) && userNum === correctNum) return true;
                    }
                    return false;
                }
                // 两者都是纯数字字符串，比较数值
                if (/^[\d.]+$/.test(c) && /^[\d.]+$/.test(u)) {
                    return parseFloat(u) === parseFloat(c);
                }
                return false;
            }

            // 处理答案提交
            function handleCheck() {

                    let nums = extractNumbersFromAnswer(correct);
                    if (nums) {
                        let u1 = parseInt(v1), u2 = parseInt(v2);
                        if (!isNaN(u1) && !isNaN(u2) && u1 === nums.num1 && u2 === nums.num2) isCorrect = true;

                    isCorrect = isAnswerCorrect(userAns, correct);
                }
                // 记录答案
                userAnswers.push({ question: q.題目, userAnswer: userAns, correct: correct, isCorrect: isCorrect });
                if (isCorrect) {
                    quizMessage.innerText = '🎈 正確！ 太棒了～';
                    currentIndex++;
                    if (currentIndex < currentQuestions.length) showQuestion();
                    else endGame('complete');
                } else {
                    // 错误处理：扣生命，累加错误计数
                    wrongCountThisQ++; hearts--;
                    renderHearts();
                    quizMessage.innerText = '😕 不對喔，再試試';
                    wrongCounterMsg.innerText = `❌ 已經答錯 ${wrongCountThisQ} 次 (最多3次)`;
                    if (hearts <= 0) { endGame('nohearts'); return; }
                    if (wrongCountThisQ >= 3) threeWrongDiv.classList.remove('hidden');
                }
            }

            // 从已答题记录计算准确率统计数据（只计入实际作答的题目，跳过的不算）
            function getAccuracyData() {
                const attempted = userAnswers.filter(a => a.userAnswer !== '跳過' && a.userAnswer !== '看答案');
                const attemptedCount = attempted.length;
                const correctCount = attempted.filter(a => a.isCorrect === true).length;
                const accuracy = attemptedCount > 0 ? ((correctCount / attemptedCount) * 100).toFixed(1) : 0;
                return { attemptedCount, correctCount, accuracy };
            }
            // 在统计卡片中显示统计数据
            function showStatistics() {
                const total = userAnswers.length;
                const skipped = userAnswers.filter(a => a.userAnswer === '跳過' || a.userAnswer === '看答案').length;
                const { attemptedCount, correctCount, accuracy } = getAccuracyData();
                statsContainer.innerHTML = `
                    <h3>📊 答題統計 📊</h3>
                    <div class="stats-numbers">
                        <div class="stat-item">📝 總題數: ${total}</div>
                        <div class="stat-item">⏭️ 跳過題數: ${skipped}</div>
                        <div class="stat-item">✏️ 實際作答: ${attemptedCount}</div>
                        <div class="stat-item">✅ 正確題數: ${correctCount}</div>
                    </div>
                    <div style="margin-top:15px;">
                        <span class="accuracy-big">🎯 答題準確率: ${accuracy}%</span>
                        <div style="font-size:1rem; margin-top:8px; color:#7a4d6e;">(只計算實際作答的題目，跳過的題目不計入準確率)</div>
                    </div>`;
            }
            // 游戏结束：切换至总结页，展示结果详情并自动导出Excel
            function endGame(reason) {
                settingsPage.classList.add('hidden'); quizPage.classList.add('hidden'); summaryPage.classList.remove('hidden');
                let imgHtml = (reason === 'complete') ? '<img src="happy.png" class="final-image" onerror="this.style.display=\'none\'">' : '<img src="sad.png" class="final-image" onerror="this.style.display=\'none\'">';
                document.getElementById('summaryDetail').innerHTML = imgHtml;
                let html = '';
                userAnswers.forEach(u => {
                    let resultIcon = u.isCorrect ? '✅' : (u.userAnswer === '跳過' ? '⏭️ 跳過' : (u.userAnswer === '看答案' ? '👁️ 看答案' : '❌'));
                    let displayAnswer = u.userAnswer === '跳過' ? '跳過未答' : (u.userAnswer === '看答案' ? '查看答案' : u.userAnswer);
                    html += `<tr><td>${u.question}</td><td>${displayAnswer}</td><td>${u.correct}</td><td>${resultIcon}</td></tr>`;
                });
                summaryBody.innerHTML = html;
                showStatistics();
                autoExportSummaryAfterGame();
            }
            // 游戏结束后自动导出总结Excel
            function autoExportSummaryAfterGame() {
                if (!userAnswers.length) return;
                const { attemptedCount, correctCount, accuracy } = getAccuracyData();
                const wb = XLSX.utils.book_new();
                const rows = [['題目','你的答案','正確答案','結果','備註']];
                userAnswers.forEach(ans => {
                    let status = ans.isCorrect ? '正確' : (ans.userAnswer === '跳過' ? '跳過' : (ans.userAnswer === '看答案' ? '查看答案' : '錯誤'));
                    rows.push([ans.question, ans.userAnswer, ans.correct, status, status === '跳過' ? '未作答' : '']);
                });
                const statsRows = [
                    ['📊 答題統計總結'],
                    ['總題數', userAnswers.length],
                    ['跳過/看答案題數', userAnswers.filter(a => a.userAnswer === '跳過' || a.userAnswer === '看答案').length],
                    ['實際作答題數', attemptedCount],
                    ['正確題數', correctCount],
                    ['答題準確率 (%)', `${accuracy}%`],
                    ['計算說明', '準確率 = 正確題數 / 實際作答題數 × 100% (跳過的題目不計入)']
                ];
                const statsSheet = XLSX.utils.aoa_to_sheet(statsRows);
                XLSX.utils.book_append_sheet(wb, statsSheet, '統計摘要');
                const ws = XLSX.utils.aoa_to_sheet(rows);
                XLSX.utils.book_append_sheet(wb, ws, '答題明細');
                const now = new Date();
                const fileName = `數學闖關總結_${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}-${now.getMinutes().toString().padStart(2,'0')}-${now.getSeconds().toString().padStart(2,'0')}.xlsx`;
                XLSX.writeFile(wb, fileName);
            }
            // 跳过当前题目，记录跳过并进入下一题
            function skipQuestion() { if (currentIndex >= currentQuestions.length) return;
                userAnswers.push({ question: currentQuestions[currentIndex].題目, userAnswer: '跳過', correct: currentQuestions[currentIndex].答案, isCorrect: false });
                currentIndex++; if (currentIndex < currentQuestions.length) showQuestion(); else endGame('complete'); }
            // 显示本题答案并跳过
            function showAnswerAndNext() { if (currentIndex >= currentQuestions.length) return;
                alert(`答案是： ${currentQuestions[currentIndex].答案}`);
                userAnswers.push({ question: currentQuestions[currentIndex].題目, userAnswer: '看答案', correct: currentQuestions[currentIndex].答案, isCorrect: false });
                currentIndex++; if (currentIndex < currentQuestions.length) showQuestion(); else endGame('complete'); }
            // 手动导出总结
            function exportSummaryManual() { if (userAnswers.length === 0) { alert('沒有記錄'); return; } autoExportSummaryAfterGame(); }

            // ── Excel upload (raw:false so time stays as text) ──
            // 上传Excel并解析题目
            excelUpload.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const questions = parseWorkbookToQuestions(ev.target.result, file.name);
            handleLoadedQuestions(questions, `✅ 已載入 ${file.name}（${questions.length} 題）`);
        } catch (err) {
            alert('❌ 解析 Excel/CSV 失敗，請確認檔案格式正確。');
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
});

            // ── Event listeners ──
            // 题目来源单选框切换：启用/禁用文件上传，并更新题型复选框
            sourceRadios.forEach(r => r.addEventListener('change', (e) => {
                excelUpload.disabled = e.target.value !== 'upload';
                if (e.target.value === 'upload') {
                    if (uploadedData && uploadedData.length > 0) updateTypeCheckboxesFromData();
                    else renderTypeCheckboxes([]);
                } else { renderDefaultCheckboxes(); }
            }));
            // 题型全选/全不选
            selectAllBtn.addEventListener('click', () => document.querySelectorAll('#typeCheckGroup input[type="checkbox"]').forEach(c => c.checked = true));
            deselectAllBtn.addEventListener('click', () => document.querySelectorAll('#typeCheckGroup input[type="checkbox"]').forEach(c => c.checked = false));
            // 开始游戏按钮：加载题目并进入答题界面
            startBtn.addEventListener('click', () => {
                if (loadQuestionsFromSettings()) { resetQuiz(); settingsPage.classList.add('hidden'); quizPage.classList.remove('hidden'); showQuestion(); }
            });
            // 打印按钮
            printQuestionsOnlyBtn.addEventListener('click', () => printQuestions(false));
            printWithAnswerBtn.addEventListener('click', () => printQuestions(true));
            // 下载所有题目
            downloadAllBtn.addEventListener('click', downloadQuestionsAsExcel);
            // 导出总结按钮（手动）
            exportSummaryBtn.addEventListener('click', exportSummaryManual);
            // 从答题页返回设置页（需要确认会丢失进度）
            backToSettingsFromQuiz.addEventListener('click', () => {
                if (confirm('回到設定頁，目前進度會遺失喔')) { quizPage.classList.add('hidden'); settingsPage.classList.remove('hidden'); }
            });
            // 跳过题目
            skipBtn.addEventListener('click', skipQuestion);
            // 三次错误后显示答案并继续
            showAnswerThenNext.addEventListener('click', showAnswerAndNext);
            // 继续答题而不显示答案
            continueWrong.addEventListener('click', () => { threeWrongDiv.classList.add('hidden'); });
            // 总结页重新开始或回到设置
            restartFromSummary.addEventListener('click', () => { summaryPage.classList.add('hidden'); settingsPage.classList.remove('hidden'); });
            settingsFromSummary.addEventListener('click', () => { summaryPage.classList.add('hidden'); settingsPage.classList.remove('hidden'); });

            // ── start ──
            // 页面初始化，加载可能存在的本地默认题库
            initDefaultBank(); // 异步执行，无需 await
        })();
    </script>
</body>
</html>
