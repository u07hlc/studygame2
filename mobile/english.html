<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦄 魔法听写 · 分组精灵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: url('bg3.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #5e2a4a;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 235, 245, 0.15);
            pointer-events: none;
            z-index: 0;
        }

        .corner-img {
            position: fixed;
            width: 160px;
            height: auto;
            pointer-events: none;
            z-index: 30;
            filter: drop-shadow(0 15px 20px rgba(245, 145, 200, 0.6));
            animation: floatSoft 7s infinite ease-in-out;
        }

        #corner1 { top: 15px; left: 15px; width: 170px; }
        #corner2 { top: 15px; right: 15px; width: 160px; animation-delay: 1.5s; }
        #corner3 { bottom: 15px; left: 15px; width: 165px; animation-delay: 2.2s; }
        #corner4 { bottom: 15px; right: 15px; width: 180px; animation-delay: 0.8s; }

        @keyframes floatSoft {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(4deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .glass-card {
            max-width: 950px;
            margin: 30px auto;
            background: rgba(255, 245, 250, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 40px rgba(235, 120, 180, 0.3), 0 0 0 3px #ffe7f6 inset, 0 0 0 5px #ffd9f0;
            padding: 30px 30px 40px;
            border: 2px solid white;
            position: relative;
            z-index: 10;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            color: #6b2b4f;
            text-shadow: 2px 2px 0 #ffd0e8;
            letter-spacing: 1px;
        }

        h1 span {
            font-size: 3rem;
            display: inline-block;
            filter: drop-shadow(0 4px 2px #fbb0d0);
            color: #7a3a5a;
        }

        .top-buttons {
            position: absolute;
            top: 25px;
            right: 190px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }

        .home-button, .settings-top-btn {
            background: rgba(255, 200, 230, 0.7);
            backdrop-filter: blur(2px);
            border: 4px solid white;
            border-radius: 60px;
            padding: 10px 22px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a1e35;
            text-decoration: none;
            box-shadow: 0 5px 0 #b35d86, 0 8px 15px rgba(255, 150, 200, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.1s ease;
            cursor: pointer;
        }

        .home-button:hover, .settings-top-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #b35d86, 0 12px 20px rgba(255, 150, 200, 0.6);
        }
        .home-button:active, .settings-top-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b35d86;
        }

        .btn {
            background: rgba(245, 173, 240, 0.7);
            backdrop-filter: blur(2px);
            border: none;
            border-radius: 60px;
            padding: 16px 32px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #4a1e35;
            text-shadow: 1px 1px 0 #ffe2f0;
            box-shadow: 0 10px 0 #b35d86, 0 4px 20px #ffb3d0;
            cursor: pointer;
            transition: 0.07s ease;
            border: 3px solid #ffe3f1;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #b35d86;
        }

        .btn.small, .btn-small {
            font-size: 1.1rem;
            padding: 8px 16px;
            box-shadow: 0 5px 0 #b35d86;
            background: rgba(245, 173, 240, 0.7);
            backdrop-filter: blur(2px);
            border: 3px solid #ffe3f1;
            color: #4a1e35;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }

        .settings-panel {
            background: rgba(255, 240, 250, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 50px;
            padding: 20px 25px;
            margin: 15px 0 25px;
            border: 3px dotted #ffa5cf;
            box-shadow: 0 10px 0 #fbb0d0;
        }

        .setting-row, .setting-row-special {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            margin: 10px 0;
            gap: 12px;
        }
        .setting-row label, .setting-row-special label {
            flex: 0 0 150px;
            font-size: 1.3rem;
            color: #4a1e35;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            white-space: nowrap;
        }
        .setting-row input, .setting-row select, .setting-row-special input {
            flex: 0 0 auto;
            width: 85px;
            padding: 8px 12px;
            font-size: 1.2rem;
            border: 3px solid #d96e9f;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.8);
            color: #3d1a2e;
            outline: none;
            box-shadow: 0 4px 0 #b35d86;
            font-weight: 500;
            text-align: center;
        }
        .setting-row select { width: 192px; text-align: left; padding-left: 15px; }
        .button-group-inline { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .add-words-btn { background: rgba(140, 210, 255, 0.85); box-shadow: 0 4px 0 #3a6d8c; color: #1a3a4a; }
        .max-check-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 220, 240, 0.6);
            padding: 5px 12px;
            border-radius: 60px;
            margin-left: 5px;
        }
        .max-check-wrapper label { flex: none; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .max-check-wrapper input { width: 18px; height: 18px; margin: 0; cursor: pointer; box-shadow: none; }
        .file-note {
            background: rgba(255, 224, 240, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 1.1rem;
            border: 2px dashed #f479b6;
            margin: 15px 0 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            color: #4a1e35;
            font-weight: 500;
        }
        .group-selector {
            background: rgba(255, 248, 225, 0.6);
            border-radius: 45px;
            padding: 15px 18px;
            margin: 15px 0 10px;
            border: 2px solid #ffbf8f;
        }
        .group-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #6b2b4f;
        }
        .group-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .group-chip {
            background: rgba(255, 215, 235, 0.7);
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 1rem;
            font-weight: bold;
            border: 3px solid #ffb3d0;
            color: #5e2a4a;
            cursor: pointer;
            transition: 0.1s;
            backdrop-filter: blur(2px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .group-chip.selected {
            background: #ffb0cf;
            border-color: #b35d86;
            color: white;
            text-shadow: 1px 1px 0 #b35d86;
            box-shadow: 0 2px 8px #ff99c2;
        }
        .group-chip small {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            padding: 2px 6px;
        }
        .word-progress {
            font-size: 1.8rem;
            background: rgba(255, 218, 240, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 50px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            flex-wrap: wrap;
            color: #4a1e35;
            font-weight: bold;
        }
        #heartsDisplay { font-size: 1.8rem; letter-spacing: 2px; white-space: nowrap; }
        .tts-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0 12px;
            background: rgba(255, 232, 242, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 50px;
            padding: 12px 18px;
            color: #4a1e35;
        }
        .sentence-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 5px 0 15px;
            background: rgba(255, 242, 230, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 50px;
            padding: 10px 18px;
            border: 2px solid #ffc8a2;
        }
        .voice-btn {
            background: rgba(196, 162, 255, 0.7);
            backdrop-filter: blur(2px);
            border: 3px solid #eed6ff;
            border-radius: 50px;
            padding: 6px 12px;
            font-size: 1rem;
            color: #2e1a3a;
            font-weight: bold;
            box-shadow: 0 4px 0 #6b4b8c;
            cursor: pointer;
            min-width: 65px;
            text-align: center;
        }
        .sentence-btn {
            background: rgba(255, 200, 140, 0.85);
            border-color: #ffb26e;
            box-shadow: 0 4px 0 #aa6f3c;
            color: #4a2a1a;
        }
        .speed-slider span { color: #4a1e35; font-weight: bold; }
        .spell-area { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; align-items: center; }
        .spell-input {
            flex: 3; min-width: 250px; padding: 16px 20px; font-size: 1.6rem;
            border: 4px solid #d96e9f; border-radius: 60px; background: rgba(255, 255, 255, 0.8);
            color: #2d1322; font-weight: 500;
        }
        .answer-box {
            background: rgba(248, 224, 255, 0.7); backdrop-filter: blur(2px); border-radius: 40px;
            padding: 10px 18px; margin: 8px 0 5px; font-size: 1.5rem; text-align: center;
            border: 4px solid #b35d86; color: #3d1a2e; font-weight: bold;
        }
        .action-row { display: flex; gap: 15px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .hidden { display: none !important; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-content {
            background: rgba(255, 245, 250, 0.95); backdrop-filter: blur(4px); border-radius: 60px;
            padding: 30px; max-width: 750px; width: 90%; max-height: 85vh; overflow-y: auto;
            border: 5px solid #ffbcd9; box-shadow: 0 20px 40px #fbb0d0; color: #4a1e35;
        }
        .stats-box {
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(2px); border-radius: 40px;
            padding: 25px; max-height: 500px; overflow-y: auto; font-size: 1.2rem;
            border: 4px solid #b35d86; color: #2d1322;
        }
        .percentage-badge {
            background: #f9c7e2; display: inline-block; padding: 8px 18px; border-radius: 60px;
            margin-bottom: 20px; font-size: 1.5rem; font-weight: bold; color: #7a2b4f;
            border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .footer-heart {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            text-align: center; font-size: 0.9rem; color: #4a1e35;
            background: rgba(255, 240, 250, 0.6); backdrop-filter: blur(2px); padding: 5px 18px;
            border-radius: 50px; border: 2px solid #b35d86; z-index: 40; white-space: nowrap; font-weight: bold;
        }
        .word-chip { background: rgba(255,255,240,0.8); border-radius: 40px; padding: 5px 12px; margin: 4px; display: inline-block; border: 1px solid #ff99bb; }
        .word-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; max-height: 400px; overflow-y: auto; }
        .final-image-container { text-align: center; margin: 10px 0 15px; }
        .final-image { max-width: 100%; height: auto; max-height: 150px; border-radius: 40px; filter: drop-shadow(0 10px 15px #ffb0d0); }
        .file-upload-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 700px) {
            body { padding: 10px; }
            .glass-card {
                padding: 20px 15px 30px;
                border-radius: 40px;
                margin: 20px auto;
            }
            h1 { font-size: 2rem; }
            h1 span { font-size: 2rem; }
            .top-buttons {
                position: static;
                flex-direction: row;
                justify-content: center;
                gap: 10px;
                margin-bottom: 15px;
            }
            .home-button, .settings-top-btn {
                font-size: 1rem;
                padding: 8px 16px;
            }
            .btn {
                font-size: 1.4rem;
                padding: 12px 20px;
                gap: 6px;
            }
            .btn.small, .btn-small {
                font-size: 1rem;
                padding: 6px 12px;
            }
            .setting-row label, .setting-row-special label {
                flex: 0 0 120px;
                font-size: 1rem;
            }
            .setting-row input, .setting-row select, .setting-row-special input {
                width: 70px;
                font-size: 1rem;
                padding: 6px 10px;
            }
            .setting-row select { width: 150px; }
            .word-progress { font-size: 1.3rem; padding: 10px 15px; }
            #heartsDisplay { font-size: 1.3rem; }
            .spell-input {
                font-size: 1.2rem;
                padding: 10px 14px;
                min-width: 180px;
            }
            .voice-btn { font-size: 0.9rem; min-width: 55px; }
            .answer-box { font-size: 1.2rem; }
            .footer-heart { font-size: 0.7rem; padding: 4px 10px; }
            .group-chip { font-size: 0.85rem; padding: 6px 12px; }
            .corner-img { width: 80px; }
            #corner1 { width: 80px; top: 8px; left: 8px; }
            #corner2 { width: 80px; top: 8px; right: 8px; }
            #corner3 { width: 80px; bottom: 8px; left: 8px; }
            #corner4 { width: 90px; bottom: 8px; right: 8px; }
            .file-note { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <img src="unicorn.png" alt="🦄" id="corner1" class="corner-img" onerror="this.style.display='none'">
    <img src="1.png" alt="🌸" id="corner2" class="corner-img" onerror="this.style.display='none'">
    <img src="2.png" alt="✨" id="corner3" class="corner-img" onerror="this.style.display='none'">
    <img src="3.png" alt="⭐" id="corner4" class="corner-img" onerror="this.style.display='none'">

    <div class="top-buttons">
        <a href="index.html" class="home-button">🏠 Home</a>
        <div class="settings-top-btn" id="topSettingsBtn">⚙️ Settings</div>
    </div>
    <div class="footer-heart">❤️ Made with love, for my dearest 🐷🐷 ❤️</div>

    <div class="glass-card" id="appContainer">
        <h1><span>🦄</span> magical spelling <span>✨</span></h1>

        <div id="settingsPanel">
            <div class="settings-panel">
                <div class="setting-row">
                    <label><span>📄</span> word list</label>
                    <div class="file-upload-row">
                        <input type="file" id="fileUpload" accept=".txt,.xlsx,.csv, .xls">
                        <button class="btn-small load-btn" id="loadFileBtn">📥 load & use</button>
                        <button class="btn-small add-words-btn" id="addWordsBtn">➕ add words</button>
                        <button class="btn-small update-default-btn" id="updateDefaultBtn">⭐ set as default</button>
                    </div>
                </div>
                <div class="file-note" id="defaultNote">
                    📚 current: <span id="currentBankLabel">master word bank</span> (<span id="loadedWordCount"></span> words)
                    <button class="btn-small" id="showWordsBtn">🔍 show all words</button>
                    <button class="btn-small" id="showSelectedGroupsWordsBtn">📋 show test words</button>
                </div>

                <div class="group-selector" id="groupSelectorPanel">
                    <div class="group-title">🎯 選擇單詞組 (可多選) <span style="font-size:0.8rem;">✨ 點擊切換</span></div>
                    <div id="groupButtonsContainer" class="group-buttons"></div>
                    <div style="font-size:0.8rem; margin-top: 8px;">💡 提示：未選任何組則默認全選所有組</div>
                </div>

                <div class="setting-row-special">
                    <label><span>🔢</span> words per session</label>
                    <input type="number" id="wordCount" min="1" max="200" value="40">
                    <div class="max-check-wrapper">
                        <label><input type="checkbox" id="maxWordsCheckbox"> 🌟 max (all)</label>
                    </div>
                </div>
                
                <div class="setting-row">
                    <label><span>🎲</span> selection mode</label>
                    <select id="selectMode">
                        <option value="random">✨ random ✨</option>
                        <option value="sequential">📋 sequential</option>
                    </select>
                    <label style="flex: 0 0 auto; margin-left: 20px;"><span>❤️</span> max hearts</label>
                    <input type="number" id="heartCount" min="1" max="20" value="10">
                </div>
            </div>
            <div style="text-align: center;">
                <button class="btn" id="startBtn"><span>🦄</span> start dictation! <span>✨</span></button>
            </div>
        </div>

        <div id="dictationArea" class="hidden">
            <div class="word-progress"><span id="wordCounter">✨ word 1 / 40</span><span id="heartsDisplay">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</span></div>
            <div class="tts-row">
                <button class="voice-btn" id="voiceUkBtn">UK 1</button>
                <button class="voice-btn" id="voiceUkMaleBtn">UK 2</button>
                <button class="voice-btn" id="voiceUsBtn">US 1</button>
                <div class="speed-slider" style="display: flex; align-items: center; gap: 6px; flex:1;">
                    <span>🐢</span><input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="0.7" style="flex:1;"><span id="speedValue">0.7x</span><span>🐇</span>
                </div>
            </div>
            <div class="sentence-row">
                <span>📖 例句朗讀：</span>
                <button class="voice-btn sentence-btn" id="sentenceUkBtn">💬 sentence-UK</button>
                <button class="voice-btn sentence-btn" id="SentenceUsBtn">💬 sentence-US</button>
            </div>
            <div class="spell-area">
                <input type="text" id="spellInput" class="spell-input" placeholder="type here..." autocomplete="off">
                <button class="btn-small" id="checkBtn">✅ check</button>
                <button class="btn-small learn-btn" id="learnBtn">📘 Learn</button>
                <button class="btn-small skip-learn-btn hidden" id="skipAfterLearnBtn">⏭️ Skip</button>
            </div>
            <div id="feedback" style="font-size:1.1rem; min-height: 2.2rem;">✨</div>
            <div id="answerDisplay" class="answer-box hidden"></div>
            <div class="action-row">
                <button class="voice-btn hidden" id="showAnswerBtn">🔍 show answer</button>
                <button class="voice-btn hidden" id="skipAfterAnswerBtn">⏩ skip</button>
            </div>
        </div>

        <div id="finalPanel" class="hidden">
            <div id="finalMessage"></div>
            <div id="finalImageContainer" class="final-image-container"></div>
            <div id="statsContainer" class="stats-box"></div>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px; flex-wrap: wrap;">
                <button class="btn" id="exportSummaryBtn">📥 Export Summary</button>
                <button class="btn" id="restartBtn"><span>🔄</span> practice again</button>
            </div>
        </div>
    </div>

    <div id="wordModal" class="modal hidden" onclick="if(event.target===this) this.classList.add('hidden')">
        <div class="modal-content"><h3>🌸 all loaded words 🌸</h3><div id="wordListContainer" class="word-grid"></div><button class="btn-small" id="closeModalBtn">close</button></div>
    </div>
    <div id="addWordsModal" class="modal hidden" onclick="if(event.target===this) this.classList.add('hidden')">
        <div class="modal-content"><h3>📝 add new words</h3><p>One word per line:</p><textarea id="newWordsTextarea" rows="8" class="text-area-input" placeholder="butterfly&#10;dolphin&#10;rainbow"></textarea><div class="modal-buttons"><button class="btn-small" id="cancelAddWordsBtn">cancel</button><button class="btn-small add-words-btn" id="confirmAddWordsBtn">✨ add to library</button></div></div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script>
        (function() {
            // ========== 词库 + 例句映射 (动态) ==========
            // 内置基础词库 (单词及对应例句)
            const builtinWordsWithSentences = [

            // ── 通用 Excel/CSV 解析 → { words, sentenceMap } ──
            function parseExcelBufferToWordBank(arrayBuffer, fileName) {
                const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
                if (!rows.length) throw new Error('Empty file');
                const newWordMap = new Map();
                for (let row of rows) {
                    if (!row || row.length < 1) continue;
                    let wordRaw = row[0];
                    if (!wordRaw || typeof wordRaw !== 'string') continue;
                    let word = wordRaw.trim();
                    if (word === "") continue;
                    let sentence = (row.length > 1 && row[1]) ? String(row[1]).trim() : "";
                    let lower = word.toLowerCase();
                    if (!newWordMap.has(lower)) {
                        newWordMap.set(lower, { word: word, sentence: sentence });
                    }
                }
                if (newWordMap.size === 0) throw new Error('No valid words found');
                const wordsList = [];
                const sentenceMapLocal = new Map();
                for (let [lower, obj] of newWordMap.entries()) {
                    wordsList.push(obj.word);
                    if (obj.sentence) sentenceMapLocal.set(lower, obj.sentence);
                }
                return { words: wordsList, sentenceMap: sentenceMapLocal };
            }

                currentGroups = buildGroups(masterWordBank);
                selectedGroupIndices.clear();
                last40Selected = false;
                renderGroupSelector();
                updateWordBankFromGroups();
            }

            // 自动加载同目录下的 word.xlsx 或 word.csv
            async function autoLoadWordFile() {
                const filesToTry = ['word.xlsx', 'word.csv'];
                for (let fileName of filesToTry) {
                    try {
                        const response = await fetch(fileName);
                        if (!response.ok) continue;
                        const arrayBuffer = await response.arrayBuffer();
                        const { words, sentenceMap: sm } = parseExcelBufferToWordBank(arrayBuffer, fileName);
                        if (words.length > 0) {
                            applyWordBank(words, sm);
                            currentBankName = `📄 自动加载: ${fileName}`;
                            updateUIWordCount();
                            return true;
                        }
                    } catch (e) {
                        continue;
                    }
                }
                return false;
            }

            // 初始化词库：按优先级 1) 同目录文件 2) localStorage 3) 内置默认
            async function initWordBank() {
                const autoLoaded = await autoLoadWordFile();
                if (autoLoaded) return;

                const storedWords = localStorage.getItem('unicorn_master_bank');
                const storedSentences = localStorage.getItem('unicorn_sentence_map');
                if (storedWords && storedSentences) {
                    try {
                        const wordsArr = JSON.parse(storedWords);
                        const sentEntries = JSON.parse(storedSentences);
                        applyWordBank(wordsArr, new Map(sentEntries));
                        const storedGroups = localStorage.getItem('unicorn_selected_groups');
                        if (storedGroups) selectedGroupIndices = new Set(JSON.parse(storedGroups));
                        else selectedGroupIndices.clear();
                        const storedLast40 = localStorage.getItem('unicorn_last40_selected');
                        if (storedLast40) last40Selected = (storedLast40 === 'true');
                        currentBankName = '💾 本地默认词库';
                        renderGroupSelector();
                        updateWordBankFromGroups();
                        updateUIWordCount();
                        return;
                    } catch (e) {}
                }

                // 回退到内置词库
                rebuildFromStatic();
                currentGroups = buildGroups(masterWordBank);
                selectedGroupIndices.clear();
                last40Selected = false;
                renderGroupSelector();
                updateWordBankFromGroups();
                updateUIWordCount();

            function playSentence(voiceType) {
                if (!sessionActive || currentSessionWords.length === 0 || currentIndex >= currentSessionWords.length) {
                    feedbackDiv.innerHTML = '✨ 请先开始听写 ✨';
                    return;
                }
                const word = currentSessionWords[currentIndex];
                const sentence = sentenceMap.get(word.toLowerCase());
                if (!sentence) {
                    feedbackDiv.innerHTML = `📢 没有例句: "${word}" , 试试朗读单词吧~`;
                    speak(word, voiceType);
                } else {
                    speak(sentence, voiceType);
                }
            }
            
            // 更新 currentWordBank 时考虑最后40个单词的选择
            function updateWordBankFromGroups() {
                let selectedWords = [];
                if (selectedGroupIndices.size === 0 && !last40Selected) {
                    currentGroups.forEach(g => selectedWords.push(...g));
                } else {
                    for (let idx of selectedGroupIndices) {
                        if (currentGroups[idx]) selectedWords.push(...currentGroups[idx]);
                    }
                }
                if (last40Selected) {
                    const last40 = masterWordBank.slice(-40);
                    selectedWords.push(...last40);
                }
                currentWordBank = [...new Map(selectedWords.map(w => [w.toLowerCase(), w])).values()];
                if (currentWordBank.length === 0) currentWordBank = ['unicorn'];

            function loadNewWord() { if (!sessionActive) return; if (currentIndex >= currentSessionWords.length) { finishSession(true); return; } incorrectAttemptsForCurrent = 0; currentEntriesLog = []; answerRevealed = false; usedLearnForCurrent = false; learnBtn.disabled = false; answerDisplay.classList.add('hidden'); showAnswerBtn.classList.add('hidden'); skipAfterAnswerBtn.classList.add('hidden'); skipAfterLearnBtn.classList.add('hidden'); spellInput.value = ''; feedbackDiv.innerHTML = '✨ type the word...'; updateProgress(); renderHearts(); playCurrentWord('UK'); }
            function calculateAccuracyPercentage() { const validItems = sessionStats.filter(stat => !stat.result.includes('learned') && stat.result !== 'skipped (answer shown)' && !stat.result.includes('skip')); const totalValid = validItems.length; const correctValid = validItems.filter(stat => stat.result === 'correct').length; return totalValid === 0 ? 0 : Math.round((correctValid / totalValid) * 100); }
            function exportWithAccuracy(manual = true) { if (sessionStats.length === 0 && manual) { alert('No records to export'); return; } if (sessionStats.length === 0 && !manual) return; const accuracy = calculateAccuracyPercentage(); const wb = XLSX.utils.book_new(); const summaryRows = [['Spelling Accuracy Report'],['Overall Accuracy (%)', accuracy + '%'],['Total Attempted Words', sessionStats.filter(s => !s.result.includes('learned') && !s.result.includes('skip')).length],['Correct Words', sessionStats.filter(s => s.result === 'correct').length],['Generated Time', new Date().toLocaleString()],[],['Detailed Word Log']]; const detailsRows = [['Word', 'Attempts', 'Entries', 'Result']]; sessionStats.forEach(s => detailsRows.push([s.word, s.attempts, s.entries.join('; '), s.result])); const finalSheetData = [...summaryRows, ...detailsRows]; const ws = XLSX.utils.aoa_to_sheet(finalSheetData); ws['!cols'] = [{wch:20},{wch:12},{wch:35},{wch:25}]; XLSX.utils.book_append_sheet(wb, ws, 'Dictation Summary'); const now = new Date(); const fileName = manual ? `dictation_manual_${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}-${now.getMinutes().toString().padStart(2,'0')}.xlsx` : `dictation_auto_${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}-${now.getMinutes().toString().padStart(2,'0')}-${now.getSeconds().toString().padStart(2,'0')}.xlsx`; XLSX.writeFile(wb, fileName); }
            function finishSession(success) { sessionActive = false; dictationDiv.classList.add('hidden'); finalDiv.classList.remove('hidden'); const percentage = calculateAccuracyPercentage(); const correctValid = sessionStats.filter(stat => stat.result === 'correct').length; const totalValid = sessionStats.filter(stat => !stat.result.includes('learned') && !stat.result.includes('skip')).length; let percentageHtml = `<div class="percentage-badge">✨ Your Spelling Accuracy ✨<br> 🎯 ${percentage}% (${correctValid}/${totalValid} correct) </div>`; if (success && currentIndex >= currentSessionWords.length) { finalMessage.innerHTML = '<h2>🎉✨ CONGRATULATIONS! ✨🎉</h2><p style="font-size:1.8rem;">you did it, superstar!</p>'; finalImageContainer.innerHTML = '<img src="happy.png" class="final-image" alt="happy unicorn" onerror="this.style.display=\'none\'">'; } else { finalMessage.innerHTML = '<h2>🌸 try again, sweetie! 🌸</h2><p style="font-size:1.6rem;">your unicorn will wait ✨</p>'; finalImageContainer.innerHTML = '<img src="sad.png" class="final-image" alt="sad unicorn" onerror="this.style.display=\'none\'">'; } let html = percentageHtml + '<table style="width:100%; border-collapse: collapse;"> <thead><tr><th style="padding:8px; text-align:left;">Word</th><th style="padding:8px; text-align:left;">Attempts</th><th style="padding:8px; text-align:left;">Entries</th><th style="padding:8px; text-align:left;">Result</th></tr></thead><tbody>'; sessionStats.forEach(s => { html += `<tr><td style="padding:6px; border-bottom:1px dashed #b35d86;">${s.word}</td><td style="padding:6px;">${s.attempts}</td><td style="padding:6px;">${s.entries.join(', ')}</td><td style="padding:6px;">${s.result}</td></tr>`; }); html += '</tbody></table>'; statsContainer.innerHTML = html; exportWithAccuracy(false); }
            function checkSpelling() { if (!sessionActive) return; let userAnswer = spellInput.value.trim().toLowerCase(); if (userAnswer === '') { feedbackDiv.innerHTML = '🌸 please write something!'; return; } let correct = currentSessionWords[currentIndex].toLowerCase(); currentEntriesLog.push(userAnswer); if (userAnswer === correct) { feedbackDiv.innerHTML = '✅✨ perfect! ✨'; sessionStats.push({ word: correct, attempts: incorrectAttemptsForCurrent + 1, entries: [...currentEntriesLog], result: usedLearnForCurrent ? 'learned + correct' : 'correct' }); currentIndex++; if (currentIndex < currentSessionWords.length) { loadNewWord(); } else { finishSession(true); } } else { incorrectAttemptsForCurrent++; hearts--; renderHearts(); spellInput.value = ''; feedbackDiv.innerHTML = `💔 oops ... try again! (${incorrectAttemptsForCurrent}/3)`; if (incorrectAttemptsForCurrent >= 3 && !answerRevealed && !usedLearnForCurrent) { showAnswerBtn.classList.remove('hidden'); } if (hearts <= 0) { sessionStats.push({ word: currentSessionWords[currentIndex], attempts: incorrectAttemptsForCurrent, entries: [...currentEntriesLog], result: usedLearnForCurrent ? 'learned + out of hearts' : 'out of hearts' }); finishSession(false); return; } } }
            function showAnswerFunc() { if (!sessionActive) return; let correct = currentSessionWords[currentIndex]; answerDisplay.textContent = `✨ ${correct} ✨`; answerDisplay.classList.remove('hidden'); answerRevealed = true; showAnswerBtn.classList.add('hidden'); skipAfterAnswerBtn.classList.remove('hidden'); }
            function skipAfterAnswer() { if (!sessionActive) return; let correct = currentSessionWords[currentIndex]; sessionStats.push({ word: correct, attempts: incorrectAttemptsForCurrent, entries: [...currentEntriesLog], result: 'skipped (answer shown)' }); currentIndex++; if (currentIndex < currentSessionWords.length) { loadNewWord(); } else { finishSession(true); } }
            function learnWord() { if (!sessionActive || usedLearnForCurrent) return; let correct = currentSessionWords[currentIndex]; answerDisplay.textContent = `✨ ${correct} ✨`; answerDisplay.classList.remove('hidden'); usedLearnForCurrent = true; learnBtn.disabled = true; showAnswerBtn.classList.add('hidden'); skipAfterLearnBtn.classList.remove('hidden'); feedbackDiv.innerHTML = '📘 learned! now try to type it, or click Skip to move on.'; }
            function skipAfterLearn() { if (!sessionActive) return; let correct = currentSessionWords[currentIndex]; sessionStats.push({ word: correct, attempts: incorrectAttemptsForCurrent, entries: [...currentEntriesLog], result: 'learned + skipped' }); currentIndex++; if (currentIndex < currentSessionWords.length) { loadNewWord(); } else { finishSession(true); } }
            function getSessionWordCount() { if (maxWordsCheckbox.checked) return currentWordBank.length; let n = parseInt(wordCountInput.value) || 40; return Math.min(200, Math.max(1, n)); }
            function startSession() { if (currentWordBank.length === 0) { alert('请先选择至少一个单词组'); return; } let limit = getSessionWordCount(); maxHearts = Math.min(20, Math.max(1, parseInt(heartCountInput.value) || 10)); hearts = maxHearts; let mode = selectMode.value; let pool = currentWordBank; if (mode === 'sequential') { currentSessionWords = pool.slice(0, Math.min(limit, pool.length)); } else { let shuffled = [...pool]; for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; } currentSessionWords = shuffled.slice(0, Math.min(limit, pool.length)); } if (currentSessionWords.length === 0) currentSessionWords = ['unicorn']; currentIndex = 0; sessionStats = []; sessionActive = true; settingsDiv.classList.add('hidden'); dictationDiv.classList.remove('hidden'); finalDiv.classList.add('hidden'); answerDisplay.classList.add('hidden'); showAnswerBtn.classList.add('hidden'); skipAfterAnswerBtn.classList.add('hidden'); skipAfterLearnBtn.classList.add('hidden'); learnBtn.disabled = false; renderHearts(); loadNewWord(); }
            function goToSettings() { if (sessionActive && speechSynth) speechSynth.cancel(); sessionActive = false; settingsDiv.classList.remove('hidden'); dictationDiv.classList.add('hidden'); finalDiv.classList.add('hidden'); }
            function restartToDefault() { if (speechSynth) speechSynth.cancel(); initWordBank().then(() => goToSettings()); }
            
            // 增强上传: 读取列A+列B 更新词库+例句
            async function loadUploadedFile() {
                const file = fileInput.files[0];
                if (!file) { alert('Please select an Excel file'); return; }
                try {
                    const buffer = await file.arrayBuffer();
                    const { words, sentenceMap: sm } = parseExcelBufferToWordBank(buffer, file.name);
                    applyWordBank(words, sm);
                    currentBankName = `📤 上传: ${file.name}`;
                    updateUIWordCount();
                    goToSettings();
                    alert(`✅ 已导入 ${words.length} 个单词及对应例句！`);
                } catch (err) { alert('读取失败: ' + err.message); }
            }
            
            function setAsDefaultBank() {
                if (confirm('⭐ 将当前词库 (含例句) 保存为默认？')) {
                    const wordsArray = masterWordBank;
                    const sentenceEntries = Array.from(sentenceMap.entries());
                    localStorage.setItem('unicorn_master_bank', JSON.stringify(wordsArray));
                    localStorage.setItem('unicorn_sentence_map', JSON.stringify(sentenceEntries));
                    localStorage.setItem('unicorn_selected_groups', JSON.stringify(Array.from(selectedGroupIndices)));
                    localStorage.setItem('unicorn_last40_selected', JSON.stringify(last40Selected));
                    alert('✅ 默认库已保存！');
                }
            }
            
            function openAddWordsModal() { newWordsTextarea.value = ''; addWordsModal.classList.remove('hidden'); }
            function confirmAddWords() {
                const rawText = newWordsTextarea.value;
                if (!rawText.trim()) return;
                const lines = rawText.split(/\r?\n/);
                let added = 0;
                for (let line of lines) {
                    let word = line.trim();
                    if (word === "") continue;
                    let lower = word.toLowerCase();
                    if (!masterWordBank.some(w => w.toLowerCase() === lower)) {
                        masterWordBank.push(word);
                        if (!sentenceMap.has(lower)) sentenceMap.set(lower, "");
                        added++;
                    }
                }
                if (added > 0) {
                    currentGroups = buildGroups(masterWordBank);
                    selectedGroupIndices.clear();
                    last40Selected = false;
                    renderGroupSelector();
                    updateWordBankFromGroups();
                    alert(`✨ 添加了 ${added} 个新单词。`);
                } else { alert('没有新单词或重复'); }
                addWordsModal.classList.add('hidden');
            }
            
            // 保留 loadStoredDefault 以便兼容，但不再主动调用
            function loadStoredDefault() {
                const storedWords = localStorage.getItem('unicorn_master_bank');
                const storedSentences = localStorage.getItem('unicorn_sentence_map');
                if (storedWords && storedSentences) {
                    try {
                        const wordsArr = JSON.parse(storedWords);
                        const sentEntries = JSON.parse(storedSentences);
                        masterWordBank = wordsArr;
                        sentenceMap.clear();
                        for (let [k,v] of sentEntries) sentenceMap.set(k, v);
                        currentGroups = buildGroups(masterWordBank);
                        const storedGroups = localStorage.getItem('unicorn_selected_groups');
                        if (storedGroups) selectedGroupIndices = new Set(JSON.parse(storedGroups));
                        else selectedGroupIndices.clear();
                        const storedLast40 = localStorage.getItem('unicorn_last40_selected');
                        if (storedLast40) last40Selected = (storedLast40 === 'true');
                        renderGroupSelector();
                        updateWordBankFromGroups();
                        return;
                    } catch(e) {}
                }
                rebuildFromStatic();
                currentGroups = buildGroups(masterWordBank);
                selectedGroupIndices.clear();
                last40Selected = false;
                renderGroupSelector();
                updateWordBankFromGroups();
            }
            
            // 事件绑定
            exportSummaryBtn.addEventListener('click', () => exportWithAccuracy(true));
            loadFileBtn.addEventListener('click', loadUploadedFile);
            updateDefaultBtn.addEventListener('click', setAsDefaultBank);
            addWordsBtn.addEventListener('click', openAddWordsModal);
            confirmAddWordsBtn.addEventListener('click', confirmAddWords);
            cancelAddWordsBtn.addEventListener('click', () => addWordsModal.classList.add('hidden'));
            startBtn.addEventListener('click', startSession);
            restartBtn.addEventListener('click', restartToDefault);
            topSettingsBtn.addEventListener('click', goToSettings);
            checkBtn.addEventListener('click', checkSpelling);
            spellInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkSpelling(); });
            showAnswerBtn.addEventListener('click', showAnswerFunc);
            skipAfterAnswerBtn.addEventListener('click', skipAfterAnswer);
            skipAfterLearnBtn.addEventListener('click', skipAfterLearn);
            voiceUkBtn.addEventListener('click', () => playCurrentWord('UK'));
            voiceUsBtn.addEventListener('click', () => playCurrentWord('US'));
            voiceUkMaleBtn.addEventListener('click', () => playCurrentWord('UKMALE'));
            learnBtn.addEventListener('click', learnWord);
            speedRange.addEventListener('input', (e) => { currentSpeed = parseFloat(e.target.value); speedValue.innerText = currentSpeed.toFixed(1) + 'x'; });
            maxWordsCheckbox.addEventListener('change', (e) => { wordCountInput.disabled = e.target.checked; wordCountInput.style.opacity = e.target.checked ? '0.6' : '1'; });
            wordCountInput.disabled = maxWordsCheckbox.checked;
            if (sentenceUkBtn) sentenceUkBtn.addEventListener('click', () => playSentence('UK'));
            if (sentenceUsBtn) sentenceUsBtn.addEventListener('click', () => playSentence('US'));
            // 页面启动，按优先级初始化词库
            initWordBank();
        })();
    </script>
</body>
</html>
