<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦄 獨角獸數學 - 智能闖關</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Comic Sans MS','Chalkboard SE','幼圆','Segoe UI',cursive,sans-serif; }
        body { min-height:100vh; margin:0; padding:20px; position:relative; overflow-x:hidden; background:url('bg3.jpg'); background-size:cover; background-attachment:fixed; background-position:center; color:#2d1322; display:flex; justify-content:center; align-items:flex-start; }
        body::before { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,235,245,0.15); pointer-events:none; z-index:0; }
        .corner-img { position:fixed; width:160px; height:auto; pointer-events:none; z-index:30; filter:drop-shadow(0 15px 20px rgba(245,145,200,0.6)); animation:floatSoft 7s infinite ease-in-out; }
        #corner1 { top:15px; left:15px; width:170px; } #corner2 { top:15px; right:15px; width:160px; animation-delay:1.5s; }
        #corner3 { bottom:15px; left:15px; width:165px; animation-delay:2.2s; } #corner4 { bottom:15px; right:15px; width:180px; animation-delay:0.8s; }
        @keyframes floatSoft { 0%{ transform:translateY(0px) rotate(0deg); } 50%{ transform:translateY(-18px) rotate(4deg); } 100%{ transform:translateY(0px) rotate(0deg); } }
        .game-container { width:100%; max-width:950px; background:rgba(255,245,250,0.5); backdrop-filter:blur(2px); border-radius:70px 70px 50px 50px; box-shadow:0 20px 40px rgba(221,160,221,0.3), 0 0 0 6px #ffe6f0 inset, 0 0 0 12px #ffd9f0; padding:30px 30px 40px; border:4px solid white; position:relative; z-index:2; }
        .unicorn-corner { position:absolute; top:-20px; left:30px; font-size:70px; filter:drop-shadow(0 8px 10px #fbb1e0); transform:rotate(-10deg); }
        .unicorn-corner-right { position:absolute; top:-20px; right:30px; font-size:70px; filter:drop-shadow(0 8px 10px #c58cff); transform:rotate(10deg) scaleX(-1); }
        .home-button-outside { position:fixed; top:25px; right:190px; z-index:100; background:rgba(255,200,230,0.7); backdrop-filter:blur(2px); border:4px solid white; border-radius:60px; padding:12px 25px; font-size:1.3rem; font-weight:bold; color:#4a1e35; text-decoration:none; box-shadow:0 6px 0 #b35d86, 0 8px 15px rgba(255,150,200,0.5); display:inline-flex; align-items:center; gap:10px; transition:0.1s ease; cursor:pointer; }
        .home-button-outside:hover { transform:translateY(-3px); box-shadow:0 9px 0 #b35d86, 0 12px 20px rgba(255,150,200,0.6); }
        .home-button-outside:active { transform:translateY(3px); box-shadow:0 3px 0 #b35d86; }
        .setting-panel { background:rgba(255,245,250,0.5); backdrop-filter:blur(2px); border-radius:50px; padding:25px; border:5px dashed #ddbbff; box-shadow:inset 0 0 20px #f7c2e9; margin:15px 0; font-size:1.2rem; }
        .setting-row { display:flex; flex-wrap:wrap; align-items:center; margin:15px 0; gap:15px; background:rgba(250,230,255,0.5); backdrop-filter:blur(2px); padding:12px 20px; border-radius:40px; }
        .setting-label { font-size:1.4rem; font-weight:bold; color:#4a1e35; min-width:140px; }
        .type-check-group { display:flex; flex-wrap:wrap; gap:15px; align-items:center; max-width:700px; }
        .type-check-group label { font-size:1.2rem; background:rgba(226,176,255,0.5); backdrop-filter:blur(2px); padding:8px 16px; border-radius:40px; color:#2d1322; font-weight:bold; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
        .type-check-group input { width:18px; height:18px; accent-color:#c458cb; margin-right:4px; transform:scale(1.1); }
        select, input[type=number], input[type=file] { font-size:1.2rem; padding:12px 20px; border-radius:50px; border:3px solid #c458cb; background:rgba(255,255,255,0.8); outline:none; color:#2d1322; flex:1 1 200px; font-weight:500; }
        .file-zone { background:rgba(245,225,255,0.5); backdrop-filter:blur(2px); border-radius:40px; padding:15px 20px; display:flex; align-items:center; gap:15px; flex-wrap:wrap; color:#4a1e35; font-weight:bold; font-size:1.2rem; }
        .badge { background:rgba(255,179,217,0.5); backdrop-filter:blur(2px); color:#4a1e35; border-radius:40px; padding:8px 20px; font-size:1.2rem; font-weight:bold; }
        .btn { background:rgba(245,173,240,0.7); backdrop-filter:blur(2px); border:none; color:#4a1e35; font-size:1.4rem; font-weight:bold; padding:14px 28px; border-radius:60px; box-shadow:0 6px 0 #b35d86, 0 8px 25px #ffb3f0; cursor:pointer; transition:0.1s ease; border:3px solid #fff9; }
        .btn:active { transform:translateY(4px); box-shadow:0 2px 0 #b35d86; }
        .btn-small { font-size:1.2rem; padding:10px 18px; box-shadow:0 4px 0 #b35d86; background:rgba(245,173,240,0.7); backdrop-filter:blur(2px); border:3px solid #fff9; color:#4a1e35; border-radius:50px; cursor:pointer; font-weight:bold; }
        .btn-download { background:rgba(159,122,234,0.7); backdrop-filter:blur(2px); box-shadow:0 4px 0 #6b46c1; font-size:1.2rem; padding:10px 18px; color:#2d1322; }
        .btn-save-default { background:rgba(255,200,100,0.7); backdrop-filter:blur(2px); box-shadow:0 4px 0 #c8890a; font-size:1.1rem; padding:8px 16px; color:#4a1e35; border-radius:50px; cursor:pointer; font-weight:bold; border:3px solid #fff9; }
        .btn-clear-default { background:rgba(255,150,150,0.7); backdrop-filter:blur(2px); box-shadow:0 4px 0 #b35d5d; font-size:1.1rem; padding:8px 16px; color:#4a1e35; border-radius:50px; cursor:pointer; font-weight:bold; border:3px solid #fff9; }
        .default-badge { background:rgba(255,200,100,0.6); backdrop-filter:blur(2px); color:#7a4a00; border-radius:40px; padding:6px 16px; font-size:1rem; font-weight:bold; border:2px solid #e8a800; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{ box-shadow:0 0 8px rgba(255,180,0,0.5); } 50%{ box-shadow:0 0 20px rgba(255,180,0,0.9); } }
        .action-button-group { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; margin:20px 0; }
        .hearts { display:flex; gap:5px; justify-content:center; margin:10px 0; font-size:2.2rem; letter-spacing:3px; white-space:nowrap; }
        .heart-full { color:#ff4570; text-shadow:0 0 15px #ffb3c6; } .heart-empty { color:#aaa; opacity:0.5; }
        .question-box { background:rgba(253,242,255,0.5); backdrop-filter:blur(2px); border-radius:50px; padding:30px; text-align:center; border:6px solid white; box-shadow:0 0 0 6px #ebaef0; font-size:1.8rem; line-height:1.5; color:#2d1322; font-weight:500; }
        .answer-area { margin:20px 0; display:flex; flex-wrap:wrap; justify-content:center; gap:15px; align-items:center; }
        .answer-input { font-size:2rem; width:180px; text-align:center; border:5px solid #b35d86; border-radius:60px; background:rgba(255,255,255,0.8); color:#2d1322; font-weight:500; padding:12px; }
        .multi-input-container { display:flex; flex-wrap:wrap; align-items:center; gap:12px; justify-content:center; }
        .multi-input { font-size:1.8rem; width:120px; text-align:center; border:5px solid #b35d86; border-radius:50px; background:rgba(255,255,255,0.8); color:#2d1322; font-weight:500; padding:10px; }
        .multi-label { font-size:1.6rem; color:#4a1e35; font-weight:bold; }
        .skip-btn { background:rgba(216,181,255,0.7); backdrop-filter:blur(2px); font-size:1.3rem; padding:8px 20px; border-radius:40px; border:3px solid white; color:#2d1322; font-weight:bold; cursor:pointer; }
        .summary-table { width:100%; border-collapse:collapse; background:rgba(250,240,255,0.5); backdrop-filter:blur(2px); border-radius:30px; overflow:hidden; margin:20px 0; }
        .summary-table th { background:rgba(203,135,245,0.7); backdrop-filter:blur(2px); color:#2d1322; font-size:1.2rem; padding:12px; font-weight:bold; }
        .summary-table td { padding:10px; border-bottom:2px solid #b35d86; font-size:1.1rem; color:#2d1322; font-weight:500; }
        .final-image { display:block; max-width:150px; margin:10px auto; border-radius:40px; filter:drop-shadow(0 10px 15px #ffb0d0); }
        .hidden { display:none !important; }
        #quizMessage, #wrongCounterMsg { color:#4a1e35 !important; font-weight:bold; font-size:1.4rem; }
        .footer-heart { position:fixed; bottom:15px; left:50%; transform:translateX(-50%); text-align:center; font-size:1rem; color:#4a1e35; background:rgba(255,240,250,0.6); backdrop-filter:blur(2px); padding:6px 20px; border-radius:50px; border:2px solid #b35d86; z-index:40; white-space:nowrap; font-weight:bold; }
        .title-center { text-align:center; font-size:3rem; margin-bottom:20px; }
        .progress-badge { background:rgba(255,200,230,0.7); backdrop-filter:blur(4px); border-radius:60px; padding:8px 18px; font-size:1.3rem; font-weight:bold; color:#4a1e35; display:inline-block; border:2px solid #ffc0e0; box-shadow:0 2px 8px rgba(0,0,0,0.05); letter-spacing:1px; }
        .stats-card { background:rgba(255,220,240,0.6); backdrop-filter:blur(4px); border-radius:40px; padding:20px; margin:20px 0; text-align:center; border:3px solid #ffc0e8; }
        .stats-card h3 { font-size:1.8rem; color:#b3457a; margin-bottom:10px; }
        .stats-numbers { font-size:1.5rem; display:flex; justify-content:center; gap:30px; flex-wrap:wrap; margin-top:10px; }
        .stat-item { background:rgba(255,255,255,0.5); padding:10px 20px; border-radius:50px; }
        .accuracy-big { font-size:2.5rem; font-weight:bold; color:#c94f7c; }
        .default-status-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:10px; background:rgba(255,245,220,0.5); padding:10px 20px; border-radius:40px; }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 700px) {
            body { padding: 10px; }
            .game-container {
                padding: 20px 15px 30px;
                border-radius: 50px;
            }
            .title-center { font-size: 2.2rem; }
            .unicorn-corner, .unicorn-corner-right { font-size: 40px; top: -10px; }
            .home-button-outside {
                position: fixed;
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 1rem;
            }
            .setting-panel { padding: 15px; font-size: 1rem; }
            .setting-row { padding: 8px 15px; gap: 10px; }
            .setting-label { font-size: 1.1rem; min-width: 100px; }
            .type-check-group label { font-size: 1rem; padding: 6px 12px; }
            select, input[type=number], input[type=file] {
                font-size: 1rem;
                padding: 10px 15px;
                flex: 1 1 auto;
            }
            .btn { font-size: 1.2rem; padding: 10px 20px; }
            .btn-small { font-size: 1rem; padding: 8px 14px; }
            .question-box { font-size: 1.5rem; padding: 20px; }
            .answer-input { font-size: 1.5rem; width: 150px; }
            .multi-input { font-size: 1.3rem; width: 100px; }
            .multi-label { font-size: 1.2rem; }
            .hearts { font-size: 1.8rem; }
            .progress-badge { font-size: 1rem; padding: 6px 12px; }
            .footer-heart { font-size: 0.7rem; padding: 4px 10px; }
            .corner-img { width: 80px; }
            #corner1 { width: 80px; top: 8px; left: 8px; }
            #corner2 { width: 80px; top: 8px; right: 8px; }
            #corner3 { width: 80px; bottom: 8px; left: 8px; }
            #corner4 { width: 90px; bottom: 8px; right: 8px; }
            .summary-table th, .summary-table td { font-size: 0.9rem; padding: 8px; }
            #quizMessage, #wrongCounterMsg { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <img src="unicorn.png" alt="🦄" id="corner1" class="corner-img" onerror="this.style.display='none'">
    <img src="1.png" alt="🌸" id="corner2" class="corner-img" onerror="this.style.display='none'">
    <img src="2.png" alt="✨" id="corner3" class="corner-img" onerror="this.style.display='none'">
    <img src="3.png" alt="⭐" id="corner4" class="corner-img" onerror="this.style.display='none'">

    <a href="index.html" class="home-button-outside">🏠 首頁</a>

    <div class="game-container" id="gameRoot">
        <div class="unicorn-corner">🦄✨</div>
        <div class="unicorn-corner-right">🦄🌈</div>

        <div id="settingsPage">
            <h1 class="title-center">🦄 獨角獸數學 🦄</h1>
            <div class="setting-panel">
                <div class="file-zone">
                    <span class="badge">📁 題目來源</span>
                    <label style="font-size:1.2rem;">🔹 使用系統隨機題庫 <input type="radio" name="source" value="random" checked></label>
                    <label style="font-size:1.2rem;">🔸 上傳 Excel <input type="radio" name="source" value="upload"></label>
                    <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv" disabled>
                    <span id="uploadHint" style="color:#b34eaf; font-size:1.2rem;"></span>
                </div>
                <div id="defaultStatusArea" class="default-status-row"></div>

                <div class="setting-row">
                    <span class="setting-label">🦄 題目類型</span>
                    <div class="type-check-group" id="typeCheckGroup"></div>
                    <div style="display: flex; gap: 10px; margin-left: auto;">
                        <button class="btn-small" id="selectAllBtn">全選</button>
                        <button class="btn-small" id="deselectAllBtn">全不選</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">📋 題目數量</span>
                    <input type="number" id="questionCount" min="1" max="1000" value="40">
                    <span style="margin-left: 10px; font-size:1.2rem;">(1-1000)</span>
                </div>
                <div class="setting-row">
                    <span class="setting-label">⚡ 難度等級</span>
                    <select id="difficulty">
                        <option value="1">Level 1 (正整數)</option>
                        <option value="2">Level 2 (可含分數/小數/負數)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-label">❤️ 心的數量</span>
                    <input type="number" id="heartsCount" min="1" max="20" value="10">
                    <span style="margin-left: 10px; font-size:1.2rem;">(最多20)</span>
                </div>

                <div class="action-button-group">
                    <button class="btn" id="startGameBtn">🚀 開始闖關</button>
                    <button class="btn-small print-btn" id="printQuestionsOnlyBtn">🖨️ 打印題目</button>
                    <button class="btn-small print-btn" id="printWithAnswerBtn">🖨️ 打印題目+答案</button>
                </div>
                <div class="download-group">
                    <button class="btn-small btn-download" id="downloadAllQuestionsBtn">📥 下載所有題目 (Excel)</button>
                </div>
            </div>
        </div>

        <div id="quizPage" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; position: relative; margin-bottom: 10px;">
                <button class="btn-small" id="backToSettingsFromQuiz">⚙️ 設定</button>
                <div class="progress-badge" id="questionCounterDisplay">第 0 / 0 題</div>
                <div style="width: 70px;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: flex-start; position: relative;">
                <div></div>
                <div style="display: flex; flex-direction: column; align-items: center; flex: 1; margin: 0 20px;">
                    <div id="quizHearts" class="hearts"></div>
                    <button class="skip-btn" id="skipThisQuestion" style="margin-top: 10px;">🌟 這題未學，跳過</button>
                </div>
                <div style="width: 80px;"></div>
            </div>
            <div class="question-box" id="questionText">載入中...</div>
            <div class="answer-area" id="answerArea"></div>
            <div id="quizMessage" style="font-size:1.8rem; text-align:center;"></div>
            <div id="wrongCounterMsg" style="font-size:1.4rem; text-align:center;"></div>
            <div id="threeWrongOptions" class="hidden" style="margin-top:20px; display: flex; gap: 15px; justify-content: center;">
                <button class="btn-small" id="showAnswerThenNext">🔍 顯示答案並繼續</button>
                <button class="btn-small" id="continueWrong">😓 繼續答題</button>
            </div>
        </div>

        <div id="summaryPage" class="hidden">
            <h2 id="summaryTitle" style="font-size: 2.5rem;">✨ 闖關完成 ✨</h2>
            <div id="statsContainer" class="stats-card"></div>
            <div id="summaryDetail" class="hearts" style="font-size:1.8rem;"></div>
            <table class="summary-table" id="summaryTable">
                <thead><tr><th>題目</th><th>你的答案</th><th>正確答案</th><th>結果</th></tr></thead>
                <tbody id="summaryBody"></tbody>
            </table>
            <div style="display: flex; gap: 20px; justify-content: center; margin-top: 25px; flex-wrap: wrap;">
                <button class="btn" id="exportSummaryBtn">📥 匯出總結</button>
                <button class="btn" id="restartFromSummary">🔄 再玩一次</button>
                <button class="btn" id="settingsFromSummary">⚙️ 設定</button>
            </div>
        </div>
    </div>

    <div class="footer-heart">❤️ Made with love, for my dearest 🐷🐷 ❤️</div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script>
        (function() {
            function parseWorkbookToQuestions(arrayBuffer, fileName) {
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                let all = [];
                workbook.SheetNames.forEach(sn => {
                    const sheet = workbook.Sheets[sn];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
                    for (let i = 1; i < json.length; i++) {
                        let row = json[i];
                        if (!row || row.length < 2) continue;
                        let questionCell = row[0], answerCell = row[1], typeCell = row[2];
                        if (questionCell !== undefined && questionCell !== null && questionCell !== '' &&
                            answerCell !== undefined && answerCell !== null && answerCell !== '') {
                            let qType = (typeCell !== undefined && typeCell !== null && String(typeCell).trim() !== '') ? String(typeCell).trim() : (sn || '其他');
                            all.push({ 題目: String(questionCell), 答案: String(answerCell), 類型: qType });
                        }
                    }
                });
                return all;
            }

            function handleLoadedQuestions(questions, sourceDescription) {
                uploadedData = questions;
                uploadHint.innerText = sourceDescription;
                sourceRadios.forEach(r => { if (r.value === 'upload') r.checked = true; });
                excelUpload.disabled = false;
                usingRandom = false;
                updateTypeCheckboxesFromData();
                updateDefaultStatus();
            }

            async function autoLoadQuestionFile() {
                const filesToTry = ['question.xlsx', 'question.csv'];
                for (let fileName of filesToTry) {
                    try {
                        const response = await fetch(fileName);
                        if (!response.ok) continue;
                        const arrayBuffer = await response.arrayBuffer();
                        const questions = parseWorkbookToQuestions(arrayBuffer, fileName);
                        if (questions.length > 0) {
                            handleLoadedQuestions(questions, `✅ 已自動載入 ${fileName}（${questions.length} 題）`);
                            return true;
                        }
                    } catch (e) { continue; }
                }
                return false;
            }

            function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
            function choice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
            const names = ["小明","小華","小美","小剛","小麗","小強","小杰","小芳","小亮","小紅","小弘","小霖","小靖","宇軒","梓朗","Kate","小萱","小宇","小喬","小睿"];
            const DEFAULT_TYPES = ['加減乘除','除法','單位轉換','時間計算','單位選擇','價格','幾何','重量','純計算'];

            function generateMixedOperation(count) { let data = []; for (let i = 0; i < count; i++) { let a = rand(10,50), b = rand(2,10), c = rand(3,8); let ans = Math.floor((a+b)/c)+'...'+((a+b)%c); data.push({題目:`${choice(names)}有${a}顆糖，媽媽給了${b}顆，然後分給${c}個同學，每人得到幾顆？`,答案:ans,類型:"加減乘除"}); } return data; }
            function generateDivisionStory(count) { let data = []; for (let i = 0; i < count; i++) { let total = rand(20,150), students = rand(2,12); let q = Math.floor(total/students), r = total % students; data.push({題目:`${choice(names)}有${total}個蘋果，平均分給${students}個小朋友，每個小朋友分得幾個？`,答案:`${q}...${r}`,類型:"除法"}); } return data; }
            function generateUnitConversion(count) { let data = []; for (let i = 0; i < count; i++) { let v = rand(1,20); data.push({題目:`${v} 米 = ? 厘米`,答案:String(v*100),類型:"單位轉換"}); } return data; }
            function generateTimeCalc(count) { let data = []; for (let i = 0; i < count; i++) { let sh = rand(8,11), sm = rand(0,3)*15, dur = rand(20,90); let endTotal = sh*60 + sm + dur; data.push({題目:`${choice(names)}上午 ${sh}:${sm.toString().padStart(2,'0')} 出發，經過${dur}分鐘後到達，到達時間是？`,答案:`${Math.floor(endTotal/60)%24}:${(endTotal%60).toString().padStart(2,'0')}`,類型:"時間計算"}); } return data; }
            function generateUnitChoice(count) { let data = []; for (let i = 0; i < count; i++) { data.push({題目:`鉛筆的長度約為15 (請填 cm 或 m)`,答案:"cm",類型:"單位選擇"}); } return data; }
            function generatePriceStory(count) { let data = []; for (let i = 0; i < count; i++) { let p = rand(5,30), n = rand(2,5); data.push({題目:`${choice(names)}買了${n}枝筆，每枝${p}元，一共要付多少元？`,答案:String(p*n),類型:"價格"}); } return data; }
            function generateGeometryStory(count) { let data = []; for (let i = 0; i < count; i++) { let l = rand(5,25), w = rand(3,18); data.push({題目:`一個長方形花圃，長${l}米，寬${w}米，圍欄長多少米？`,答案:String((l+w)*2),類型:"幾何"}); } return data; }
            function generateWeightStory(count) { let data = []; for (let i = 0; i < count; i++) { let a = rand(100,500); data.push({題目:`一個蘋果重${a}克，一個西瓜的重量是蘋果的3倍，西瓜重多少克？`,答案:String(a*3),類型:"重量"}); } return data; }
            function generatePureCalcStory(count) { let data = []; for (let i = 0; i < count; i++) { let a = rand(20,200), b = rand(10,100); data.push({題目:`${a} + ${b} = ?`,答案:String(a+b),類型:"純計算"}); } return data; }
            const generators = {
                '加減乘除':generateMixedOperation,'除法':generateDivisionStory,'單位轉換':generateUnitConversion,
                '時間計算':generateTimeCalc,'單位選擇':generateUnitChoice,'價格':generatePriceStory,
                '幾何':generateGeometryStory,'重量':generateWeightStory,'純計算':generatePureCalcStory
            };
            function generateRandomQuestions(types, count, diff) {
                let pool = [];
                let perType = Math.ceil(count / types.length) + 15;
                types.forEach(t => { if (generators[t]) pool = pool.concat(generators[t](perType)); });
                if (diff === '1') pool = pool.filter(q => {
                    let ans = q.答案;
                    if (ans.includes('...')) return true;
                    let num = parseFloat(ans);
                    return isNaN(num) || (Number.isInteger(num) && num >= 0);
                });
                pool.sort(() => Math.random() - 0.5);
                return pool.slice(0, count);
            }

            function loadQuestionsFromSettings() {
                let src = 'random';
                for (let r of sourceRadios) if (r.checked) src = r.value;
                usingRandom = (src === 'random');
                let count = parseInt(questionCountInput.value, 10) || 40;
                if (count > 1000) count = 1000;
                difficulty = difficultySelect.value;
                maxHearts = parseInt(heartsInput.value, 10) || 5;
                if (maxHearts < 1) maxHearts = 1;
                if (maxHearts > 20) maxHearts = 20;
                hearts = maxHearts;
                selectedTypes = getSelectedTypesFromDOM();
                if (selectedTypes.length === 0 && usingRandom) selectedTypes = ['加減乘除'];
                if (usingRandom) {
                    currentQuestions = generateRandomQuestions(selectedTypes, count, difficulty);
                } else {
                    if (!uploadedData || uploadedData.length === 0) { alert('請先上傳 Excel 檔案或使用系統隨機題庫'); return false; }
                    let filtered = uploadedData;
                    if (selectedTypes.length > 0) filtered = uploadedData.filter(q => selectedTypes.includes(q.類型));
                    if (filtered.length === 0) filtered = uploadedData;
                    filtered.sort(() => Math.random() - 0.5);
                    currentQuestions = filtered.slice(0, count);
                }
                return true;
            }
            function downloadQuestionsAsExcel() {
                let src = 'random';
                for (let r of sourceRadios) if (r.checked) src = r.value;
                const isRandom = (src === 'random');
                let count = parseInt(questionCountInput.value, 10) || 40;
                if (count > 1000) count = 1000;
                const diff = difficultySelect.value;
                const selTypes = getSelectedTypesFromDOM();
                let downloadQuestions;
                if (isRandom) {
                    const effectiveTypes = selTypes.length > 0 ? selTypes : ['加減乘除'];
                    downloadQuestions = generateRandomQuestions(effectiveTypes, count, diff);
                } else {
                    if (!uploadedData || uploadedData.length === 0) { alert('請先上傳 Excel 檔案'); return; }
                    let filtered = uploadedData;
                    if (selTypes.length > 0) filtered = uploadedData.filter(q => selTypes.includes(q.類型));
                    if (filtered.length === 0) filtered = uploadedData;
                    filtered.sort(() => Math.random() - 0.5);
                    downloadQuestions = filtered.slice(0, count);
                }
                const wb = XLSX.utils.book_new();
                let grouped = {};
                downloadQuestions.forEach(q => {
                    let t = q.類型 || '其他';
                    if (!grouped[t]) grouped[t] = [];
                    grouped[t].push(q);
                });
                for (let type in grouped) {
                    let rows = [["題號","題目","","正確答案"]];
                    grouped[type].forEach((q, idx) => { rows.push([(idx+1).toString(), q.題目, "", q.答案]); });
                    const ws = XLSX.utils.aoa_to_sheet(rows);
                    XLSX.utils.book_append_sheet(wb, ws, type);
                }
                XLSX.writeFile(wb, `獨角獸題庫_${Date.now()}.xlsx`);
            }
            function printQuestions(incAns = false) {
                if (!loadQuestionsFromSettings()) return;
                let win = window.open('', '_blank');
                win.document.write(`<html><head><title>🦄練習題</title><style>body{font-family:'Comic Sans MS';padding:30px;}li{margin:12px 0;}</style></head><body><h1>🦄獨角獸數學</h1><ol>`);
                currentQuestions.forEach(q => { win.document.write(`<li>${q.題目}</li>`); });
                win.document.write('</ol>');
                if (incAns) {

                    win.document.write('</ol>');

                win.document.close();

            function resetQuiz() { currentIndex = 0; hearts = maxHearts; wrongCountThisQ = 0; userAnswers = [];
                threeWrongDiv.classList.add('hidden'); quizMessage.innerText = ''; wrongCounterMsg.innerText = '';
                renderHearts(); updateProgressDisplay(); }
            function isMultiPartAnswer(correct) { return /(\d+)\s*輛，最後一輛有\s*(\d+)\s*個空位/.test(correct) || /(\d+)\s*小時\s*(\d+)\s*分鐘/.test(correct); }
            function extractNumbersFromAnswer(correct) {
                let m = correct.match(/(\d+)\s*輛，最後一輛有\s*(\d+)\s*個空位/); if (m) return { num1:parseInt(m[1]), num2:parseInt(m[2]) };
                m = correct.match(/(\d+)\s*小時\s*(\d+)\s*分鐘/); if (m) return { num1:parseInt(m[1]), num2:parseInt(m[2]) }; return null;
            }
            function showQuestion() {
                if (currentIndex >= currentQuestions.length) { endGame('complete'); return; }
                updateProgressDisplay();
                let q = currentQuestions[currentIndex];
                questionText.innerText = q.題目;
                let correct = String(q.答案).trim();
                let html = '';
                if (isMultiPartAnswer(correct)) {
                    html = `<div class="multi-input-container"><input type="text" id="answerInput1" class="multi-input" placeholder="數字"><span class="multi-label">${correct.includes('輛')?'輛，最後一輛有':'小時'}</span><input type="text" id="answerInput2" class="multi-input" placeholder="數字"><span class="multi-label">${correct.includes('輛')?'個空位':'分鐘'}</span></div><button class="btn-small" id="dynamicCheckBtn">✅ 檢查答案</button>`;
                } else {
                    html = `<input type="text" id="answerInput" class="answer-input" placeholder="答案"><button class="btn-small" id="dynamicCheckBtn">✅ 檢查答案</button>`;
                }
                answerArea.innerHTML = html;
                let btn = document.getElementById('dynamicCheckBtn');
                btn.addEventListener('click', handleCheck);
                let inp = document.getElementById('answerInput');
                if (inp) inp.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleCheck(); });
                else { let i1 = document.getElementById('answerInput1'), i2 = document.getElementById('answerInput2');
                    if (i1) i1.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleCheck(); });
                    if (i2) i2.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleCheck(); }); }
                quizMessage.innerText = ''; wrongCountThisQ = 0;
                threeWrongDiv.classList.add('hidden'); wrongCounterMsg.innerText = '';
            }

            function isAnswerCorrect(userAns, correct) {
                let u = userAns.replace(/\s/g, '');
                let c = correct.replace(/\s/g, '');
                if (u === c) return true;
                if (c.includes('...')) return false;
                if (c.includes(':')) return false;
                let m = c.match(/^(\d+(?:\.\d+)?)\D.*$/);
                if (m) {
                    let numStr = m[1];
                    if (/^[\d.]+$/.test(u)) {
                        let userNum = parseFloat(u);
                        let correctNum = parseFloat(numStr);
                        if (!isNaN(userNum) && !isNaN(correctNum) && userNum === correctNum) return true;
                    }
                    return false;
                }
                if (/^[\d.]+$/.test(c) && /^[\d.]+$/.test(u)) {
                    return parseFloat(u) === parseFloat(c);
                }
                return false;
            }

            function handleCheck() {
                if (currentIndex >= currentQuestions.length) return;
                let q = currentQuestions[currentIndex];
                let correct = String(q.答案).trim();
                let userAns = '';
                let isCorrect = false;
                if (isMultiPartAnswer(correct)) {
                    let i1 = document.getElementById('answerInput1'), i2 = document.getElementById('answerInput2');
                    if (!i1 || !i2) return;
                    let v1 = i1.value.trim(), v2 = i2.value.trim();
                    if (v1 === '' || v2 === '') { quizMessage.innerText = '🌸 請填寫兩個數字！'; return; }
                    let nums = extractNumbersFromAnswer(correct);
                    if (nums) {
                        let u1 = parseInt(v1), u2 = parseInt(v2);
                        if (!isNaN(u1) && !isNaN(u2) && u1 === nums.num1 && u2 === nums.num2) isCorrect = true;
                    }
                    userAns = `${v1} , ${v2}`;
                } else {
                    let inp = document.getElementById('answerInput');
                    if (!inp) return;
                    userAns = inp.value.trim();
                    if (userAns === '') return;
                    isCorrect = isAnswerCorrect(userAns, correct);
                }
                userAnswers.push({ question: q.題目, userAnswer: userAns, correct: correct, isCorrect: isCorrect });
                if (isCorrect) {
                    quizMessage.innerText = '🎈 正確！ 太棒了～';
                    currentIndex++;
                    if (currentIndex < currentQuestions.length) showQuestion();
                    else endGame('complete');
                } else {
                    wrongCountThisQ++; hearts--;
                    renderHearts();
                    quizMessage.innerText = '😕 不對喔，再試試';
                    wrongCounterMsg.innerText = `❌ 已經答錯 ${wrongCountThisQ} 次 (最多3次)`;
                    if (hearts <= 0) { endGame('nohearts'); return; }
                    if (wrongCountThisQ >= 3) threeWrongDiv.classList.remove('hidden');
                }
            }

            function getAccuracyData() {
                const attempted = userAnswers.filter(a => a.userAnswer !== '跳過' && a.userAnswer !== '看答案');
                const attemptedCount = attempted.length;
                const correctCount = attempted.filter(a => a.isCorrect === true).length;
                const accuracy = attemptedCount > 0 ? ((correctCount / attemptedCount) * 100).toFixed(1) : 0;
                return { attemptedCount, correctCount, accuracy };
            }
            function showStatistics() {
                const total = userAnswers.length;
                const skipped = userAnswers.filter(a => a.userAnswer === '跳過' || a.userAnswer === '看答案').length;
                const { attemptedCount, correctCount, accuracy } = getAccuracyData();
                statsContainer.innerHTML = `
                    <h3>📊 答題統計 📊</h3>
                    <div class="stats-numbers">
                        <div class="stat-item">📝 總題數: ${total}</div>
                        <div class="stat-item">⏭️ 跳過題數: ${skipped}</div>
                        <div class="stat-item">✏️ 實際作答: ${attemptedCount}</div>
                        <div class="stat-item">✅ 正確題數: ${correctCount}</div>
                    </div>
                    <div style="margin-top:15px;">
                        <span class="accuracy-big">🎯 答題準確率: ${accuracy}%</span>
                        <div style="font-size:1rem; margin-top:8px; color:#7a4d6e;">(只計算實際作答的題目，跳過的題目不計入準確率)</div>
                    </div>`;
            }
            function endGame(reason) {
                settingsPage.classList.add('hidden'); quizPage.classList.add('hidden'); summaryPage.classList.remove('hidden');
                let imgHtml = (reason === 'complete') ? '<img src="happy.png" class="final-image" onerror="this.style.display=\'none\'">' : '<img src="sad.png" class="final-image" onerror="this.style.display=\'none\'">';
                document.getElementById('summaryDetail').innerHTML = imgHtml;
                let html = '';
                userAnswers.forEach(u => {
                    let resultIcon = u.isCorrect ? '✅' : (u.userAnswer === '跳過' ? '⏭️ 跳過' : (u.userAnswer === '看答案' ? '👁️ 看答案' : '❌'));
                    let displayAnswer = u.userAnswer === '跳過' ? '跳過未答' : (u.userAnswer === '看答案' ? '查看答案' : u.userAnswer);
                    html += `<tr><td>${u.question}</td><td>${displayAnswer}</td><td>${u.correct}</td><td>${resultIcon}</td></tr>`;
                });
                summaryBody.innerHTML = html;
                showStatistics();
                autoExportSummaryAfterGame();
            }
            function autoExportSummaryAfterGame() {
                if (!userAnswers.length) return;
                const { attemptedCount, correctCount, accuracy } = getAccuracyData();
                const wb = XLSX.utils.book_new();
                const rows = [['題目','你的答案','正確答案','結果','備註']];
                userAnswers.forEach(ans => {
                    let status = ans.isCorrect ? '正確' : (ans.userAnswer === '跳過' ? '跳過' : (ans.userAnswer === '看答案' ? '查看答案' : '錯誤'));
                    rows.push([ans.question, ans.userAnswer, ans.correct, status, status === '跳過' ? '未作答' : '']);
                });
                const statsRows = [
                    ['📊 答題統計總結'],
                    ['總題數', userAnswers.length],
                    ['跳過/看答案題數', userAnswers.filter(a => a.userAnswer === '跳過' || a.userAnswer === '看答案').length],
                    ['實際作答題數', attemptedCount],
                    ['正確題數', correctCount],
                    ['答題準確率 (%)', `${accuracy}%`],
                    ['計算說明', '準確率 = 正確題數 / 實際作答題數 × 100% (跳過的題目不計入)']

            function skipQuestion() { if (currentIndex >= currentQuestions.length) return;

            exportSummaryBtn.addEventListener('click', exportSummaryManual);
            backToSettingsFromQuiz.addEventListener('click', () => {
                if (confirm('回到設定頁，目前進度會遺失喔')) { quizPage.classList.add('hidden'); settingsPage.classList.remove('hidden'); }
            });
            skipBtn.addEventListener('click', skipQuestion);
            showAnswerThenNext.addEventListener('click', showAnswerAndNext);
            continueWrong.addEventListener('click', () => { threeWrongDiv.classList.add('hidden'); });
            restartFromSummary.addEventListener('click', () => { summaryPage.classList.add('hidden'); settingsPage.classList.remove('hidden'); });
            settingsFromSummary.addEventListener('click', () => { summaryPage.classList.add('hidden'); settingsPage.classList.remove('hidden'); });

            initDefaultBank();
        })();
    </script>
</body>
</html>
