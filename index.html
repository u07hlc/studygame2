<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦄 My Study Corner · magical learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: url('bg3.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #5e2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 更梦幻的半透明 overlay — 淡淡粉紫 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 215, 235, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        /* floating corner images — 放大 (原本110~130px → 160~180px) */
        .corner-img {
            position: fixed;
            width: 160px;          /* 增大基本寬度 */
            height: auto;
            pointer-events: none;
            z-index: 30;
            filter: drop-shadow(0 15px 20px rgba(245, 145, 200, 0.6));
            animation: floatSoft 7s infinite ease-in-out;
        }

        /* 個別微調位置與大小，讓四隻獨角獸更突出 */
        #corner1 { top: 15px; left: 15px; width: 170px; }        /* 左上 */
        #corner2 { top: 15px; right: 15px; width: 160px; animation-delay: 1.5s; } /* 右上 */
        #corner3 { bottom: 15px; left: 15px; width: 165px; animation-delay: 2.2s; } /* 左下 */
        #corner4 { bottom: 15px; right: 15px; width: 180px; animation-delay: 0.8s; } /* 右下 */

        @keyframes floatSoft {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(4deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* 主卡片 */
        .main-card {
            max-width: 800px;
            width: 90%;
            background: rgba(255, 245, 250, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 80px 80px 60px 60px;
            box-shadow: 0 30px 50px rgba(235, 120, 180, 0.3), 0 0 0 4px #ffe7f6 inset, 0 0 0 8px #ffd9f0;
            padding: 30px 25px 40px;
            border: 3px solid white;
            position: relative;
            z-index: 20;
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3.8rem;
            color: #9b4b6e;
            text-shadow: 4px 4px 0 #ffcfdf, 6px 6px 0 rgba(255, 200, 230, 0.7);
            margin-bottom: 15px;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        h1 span {
            display: inline-block;
            filter: drop-shadow(0 6px 6px #fbb0d0);
            font-size: 4.2rem;
        }

        .tagline {
            font-size: 1.9rem;
            color: #b35d86;
            background: rgba(255, 240, 250, 0.5);
            display: inline-block;
            padding: 8px 35px;
            border-radius: 60px;
            margin: 10px 0 30px;
            border: 3px dashed #ffa5cf;
            box-shadow: 0 6px 0 #fbb0d0;
            font-weight: bold;
            backdrop-filter: blur(1px);
        }

        /* 游戏网格 */
        .games-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            margin: 30px 0 10px;
        }

        /* 游戏卡片基础样式 */
        .game-card {
            border-radius: 50px 50px 40px 40px;
            padding: 22px 20px 20px;
            width: 170px;
            border: 4px solid white;
            transition: transform 0.18s ease, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            backdrop-filter: blur(4px);
            box-shadow: 0 12px 0 #b35d86, 0 15px 20px rgba(200, 100, 150, 0.3);
        }

        /* ENGLISH 专属粉红卡片 */
        .game-card.english-card {
            background: rgba(255, 215, 235, 0.85);
            box-shadow: 0 12px 0 #c44f7c, 0 15px 20px rgba(210, 90, 150, 0.4);
            border: 4px solid #ffe2f0;
        }

        /* MATHS 专属紫色卡片 */
        .game-card.maths-card {
            background: rgba(230, 210, 255, 0.9);
            box-shadow: 0 12px 0 #7f5a9e, 0 15px 20px rgba(140, 90, 170, 0.4);
            border: 4px solid #eeddff;
        }

        .button-img {
            width: 80px;
            height: auto;
            margin-bottom: 12px;
            filter: drop-shadow(0 8px 8px rgba(150, 70, 100, 0.25));
            transition: transform 0.2s ease;
        }

        .game-card:hover .button-img {
            transform: scale(1.08) rotate(1deg);
        }

        .game-title-simple {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin: 6px 0 0;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.6);
        }

        .english-card .game-title-simple {
            color: #ac356b;
            text-shadow: 2px 2px 0 #ffc1dc;
        }

        .maths-card .game-title-simple {
            color: #4f3480;
            text-shadow: 2px 2px 0 #dec5ff;
        }

        .game-card:hover {
            transform: translateY(-6px);
        }
        .english-card:hover {
            box-shadow: 0 16px 0 #c44f7c, 0 22px 28px rgba(210, 90, 150, 0.5);
        }
        .maths-card:hover {
            box-shadow: 0 16px 0 #7f5a9e, 0 22px 28px rgba(140, 90, 170, 0.5);
        }

        /* 首页按钮 —— 移到右上角，但向左挪一些，避開右上角獨角獸 (corner2 寬160px) */
        .home-button {
            position: absolute;
            top: 25px;
            right: 180px;          /* 保留空間給右上 unicorn (寬160px + 一些間距) */
            z-index: 50;
            background: rgba(255, 200, 230, 0.7);
            backdrop-filter: blur(2px);
            border: 4px solid white;
            border-radius: 60px;
            padding: 12px 25px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #892e5b;
            text-decoration: none;
            box-shadow: 0 6px 0 #b35d86, 0 8px 15px rgba(255, 150, 200, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.1s ease;
            cursor: pointer;
        }

        .home-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #b35d86, 0 12px 20px rgba(255, 150, 200, 0.6);
        }
        .home-button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b35d86;
        }

        /* 固定页脚 - 文字縮小並修改內容 */
        .footer-heart {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 1rem; /* 縮小字體 */
            color: #4a1e35;
            background: rgba(255, 240, 250, 0.7);
            backdrop-filter: blur(2px);
            padding: 6px 20px; /* 稍微縮小內邊距 */
            border-radius: 50px;
            border: 2px solid #b35d86;
            z-index: 40;
            white-space: nowrap;
            font-weight: bold;
        }

        /* 小星星装饰 (保留) */
        .star-decor {
            position: absolute;
            font-size: 2rem;
            user-select: none;
            pointer-events: none;
            z-index: 25;
            opacity: 0.6;
            filter: drop-shadow(0 4px 4px #fad6e0);
        }

        #star1 { top: 18%; left: 12%; transform: rotate(-5deg); animation: twinkle 3s infinite; }
        #star2 { top: 25%; right: 10%; transform: rotate(10deg); animation: twinkle 3.4s infinite reverse; }
        #star3 { bottom: 18%; left: 20%; transform: rotate(-15deg); animation: twinkle 4s infinite; }
        #star4 { bottom: 25%; right: 18%; transform: rotate(20deg); animation: twinkle 3.8s infinite; }
        #star5 { top: 40%; left: 5%; font-size: 2.5rem; opacity: 0.4; animation: floatSoft 5s infinite; }
        #star6 { bottom: 40%; right: 5%; font-size: 2.2rem; opacity: 0.4; animation: floatSoft 5.5s infinite; }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.9) rotate(0deg); }
            50% { opacity: 0.9; transform: scale(1.2) rotate(5deg); }
            100% { opacity: 0.3; transform: scale(0.9) rotate(0deg); }
        }

        /* 图片加载失败后备 */
        .button-img[src=""] { display: none; }
        .corner-img[src=""] { display: none; }
        .footer-note { display: none; }
    </style>
</head>
<body>
    <!-- 角落图片装饰 — 現在全部放大 (尺寸已在CSS中調整) -->
    <img src="unicorn.png" alt="🦄" id="corner1" class="corner-img" onerror="this.style.display='none'">
    <img src="1.png" alt="🌸" id="corner2" class="corner-img" onerror="this.style.display='none'">
    <img src="2.png" alt="✨" id="corner3" class="corner-img" onerror="this.style.display='none'">
    <img src="3.png" alt="⭐" id="corner4" class="corner-img" onerror="this.style.display='none'">

    <!-- 飘浮小星星 -->
    <div class="star-decor" id="star1">🌟</div>
    <div class="star-decor" id="star2">⭐</div>
    <div class="star-decor" id="star3">✨</div>
    <div class="star-decor" id="star4">💫</div>
    <div class="star-decor" id="star5">🪄</div>
    <div class="star-decor" id="star6">🌸</div>

    <!-- 首页按钮 —— 現在在右上角，但留了空間給corner2 (right:180px) 不重疊 -->
    <a href="index.html" class="home-button">🏠 首頁</a>

    <!-- 固定爱心页脚 - 文字已更新為指定內容 -->
    <div class="footer-heart">❤️ Made with love, for my dearest 🐷🐷 ❤️</div>

    <div class="main-card">
        <h1>
            <span>🦄</span> My Study Corner <span>✨</span>
        </h1>
        <div class="tagline">
            Learning is magical!
        </div>

        <!-- 游戏网格：English粉红，Maths紫色 -->
        <div class="games-grid">
            <!-- English Card 粉红 -->
            <a href="English.html" class="game-card english-card">
                <img src="English (2).png" alt="English unicorn" class="button-img" onerror="this.style.display='none'">
                <div class="game-title-simple">English</div>
            </a>

            <!-- Maths Card 紫色 -->
            <a href="Maths.html" class="game-card maths-card">
                <img src="maths.png" alt="Maths unicorn" class="button-img" onerror="this.style.display='none'">
                <div class="game-title-simple">Maths</div>
            </a>
        </div>

        <div class="footer-note"></div>
    </div>
</body>
</html>
